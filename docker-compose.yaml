services:
  mongodb:
    image: mongodb:v1
    container_name: mongodb
    volumes:
    - mongodb:/data/db
    networks:
    - roboshop
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data
    networks:
    - roboshop
  mysql:
    image: mysql:v1
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
    networks:
    - roboshop
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    volumes:
    - rabbitmq:/var/lib/rabbitmq
    networks:
    - roboshop
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  catalogue:
    image: catalogue:v1
    container_name: catalogue
    depends_on:
    - mongodb
    networks:
    - roboshop
  user:
    image: user:v1
    container_name: user
    depends_on:
    - mongodb
    - redis
    networks:
    - roboshop
  cart:
    image: cart:v1
    container_name: cart
    depends_on:
    - redis
    - catalogue
    networks:
    - roboshop
  shipping:
    image: shipping:v1
    container_name: shipping
    depends_on:
    - cart
    - mysql
    networks:
    - roboshop
  payment:
    image: payment:v1
    container_name: payment
    depends_on:
    - cart
    - user
    - rabbitmq
    networks:
    - roboshop
  frontend:
    image: frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment
    networks:
    - roboshop

networks:
  roboshop:
    driver: bridge

volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq: